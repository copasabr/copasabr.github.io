<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu APP</title>
  <style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: url("fundo2.png") no-repeat center center fixed;
  background-size: cover; /* ajusta a imagem para cobrir toda a tela */
}

    
    /* Estilo do menu */
    nav {
      background: linear-gradient(90deg, #001f3f, #0074D9); /* azul escuro para azul claro */
      color: white;
      position: relative;
      width: 100%;
    }

    nav ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-wrap: nowrap;
      width: 100%;
    }

    nav ul li {
      flex: 1; /* todos os itens ocupam largura igual */
      text-align: center;
      position: relative;
    }

    nav ul li a {
      display: block;
      padding: 15px 0;
      color: white;
      text-decoration: none;
      font-weight: normal;
      width: 100%;
    }

    nav ul li a:hover {
      background-color: #00509e; /* azul intermediário */
    }

    /* Submenu */
    nav ul li ul.sub-menus {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      background-color: #001f3f;
      min-width: 100%; /* submenu ocupa mesma largura do item pai */
      z-index: 999;
      flex-direction: column;
    }

    nav ul li:hover ul.sub-menus {
      display: block;
    }

    nav ul li ul.sub-menus li {
      flex: none; /* submenu não divide igualmente */
    }

    nav ul li ul.sub-menus li a {
      padding: 10px;
      color: white;
      text-align: left;
    }

    nav ul li ul.sub-menus li a:hover {
      background-color: #0074D9;
    }

    /* Responsivo */
    .menu-toggle {
      display: none;
      padding: 15px;
      background-color: #001f3f;
      color: white;
      cursor: pointer;
      text-align: center;
    }

    @media (max-width: 768px) {
      nav ul {
        display: none;
        flex-direction: column;
        width: 100%;
      }

      nav ul li {
        width: 100%;
      }

      .menu-toggle {
        display: block;
      }

      nav ul.showing {
        display: block;
      }
    }
  </style>
</head>
<body>
  <nav>
    <div class="menu-toggle">☰ Menu</div>
    <ul>
      
      <li>
        <a class="ai" href="#" target="_self">Projetos</a>
        <ul class="sub-menus">
          <li><a href="https://copasa.sharepoint.com/sites/painel-inteligente/SitePages/analise.aspx" target="_top">Análise de Projetos</a></li>
          <li><a href="https://copasa.sharepoint.com/sites/painel-inteligente/SitePages/universalizacao.aspx" target="_top">Universalização</a></li>
        </ul>
      </li>
	  
	  <li>
        <a class="ai" href="#" target="_self">Gestão de Contratos</a>
        <ul class="sub-menus">
          <li><a href="https://copasa.sharepoint.com/sites/painel-inteligente/SitePages/contratos-aditivos.aspx" target="_top">Aditivos</a></li>
          <li><a href="https://copasa.sharepoint.com/sites/painel-inteligente/SitePages/contratos.aspx" target="_top">Contratações</a></li>
        </ul>
      </li>
	  
	  <li>
        <a class="ai" href="#" target="_self">Aquisição de Materiais / Equipamentos</a>
        <ul class="sub-menus">
          <li><a href="https://copasa.sharepoint.com/sites/painel-inteligente/SitePages/aquisicoes-compras.aspx" target="_top">Compras e contratações</a></li>
          </ul>
      </li>
	  
	  <li>
        <a class="ai" href="#" target="_self">Remanejamento de Recursos</a>
        <ul class="sub-menus">
          <li><a href="https://copasa.sharepoint.com/sites/painel-inteligente/SitePages/remanejamento.aspx" target="_top">Solicitar Remanejamento</a></li>
       </ul>
      </li>
	  
   </ul>
  </nav>

  <script>
    const toggle = document.querySelector(".menu-toggle");
    const menu = document.querySelector("nav ul");

    toggle.addEventListener("click", () => {
      menu.classList.toggle("showing");
    });
  </script>
</body>

</html>

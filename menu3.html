<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Responsivo Multinível</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #000; /* fundo preto */
    }

    /* Estilo do menu */
    nav {
      background: linear-gradient(90deg, #001f3f, #0074D9); /* azul escuro para azul claro */
      color: white;
      position: relative;
      width: 100%;
    }

    nav ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-wrap: nowrap;
      width: 100%;
    }

    nav ul li {
      flex: 1; /* todos os itens ocupam largura igual */
      text-align: center;
      position: relative;
    }

    nav ul li a {
      display: block;
      padding: 15px 0;
      color: white;
      text-decoration: none;
      font-weight: bold;
      width: 100%;
    }

    nav ul li a:hover {
      background-color: #00509e; /* azul intermediário */
    }

    /* Submenu */
    nav ul li ul.sub-menus {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      background-color: #001f3f;
      min-width: 100%; /* submenu ocupa mesma largura do item pai */
      z-index: 999;
      flex-direction: column;
    }

    nav ul li:hover ul.sub-menus {
      display: flex;
    }

    nav ul li ul.sub-menus li {
      flex: none; /* submenu não divide igualmente */
    }

    nav ul li ul.sub-menus li a {
      padding: 10px;
      color: white;
      text-align: left;
    }

    nav ul li ul.sub-menus li a:hover {
      background-color: #0074D9;
    }

    /* Responsivo */
    .menu-toggle {
      display: none;
      padding: 15px;
      background-color: #001f3f;
      color: white;
      cursor: pointer;
      text-align: center;
    }

    @media (max-width: 768px) {
      nav ul {
        display: none;
        flex-direction: column;
        width: 100%;
      }

      nav ul li {
        width: 100%;
      }

      .menu-toggle {
        display: block;
      }

      nav ul.showing {
        display: flex;
      }
    }
  </style>
</head>
<body>
  <nav>
    <div class="menu-toggle">☰ Menu</div>
    <ul>
      
      <li>
        <a class="ai" href="#" target="_blank">Projetos</a>
        <ul class="sub-menus">
          <li><a href="https://copasa.sharepoint.com/sites/painel-inteligente/_layouts/15/listforms.aspx?cid=NjM3OTRjODItMzU0Ny00ODNmLWFmNTYtZTdiYWRkYzdmMWVj&nav=ZGMwMmZlZTgtNDUwYi00MDU5LWFmYjgtMTcyY2UwOTE3NzIx" target="_blank">Análise de Projetos</a></li>
          <li><a href="https://copasa.sharepoint.com/sites/painel-inteligente/_layouts/15/listforms.aspx?cid=NjM3OTRjODItMzU0Ny00ODNmLWFmNTYtZTdiYWRkYzdmMWVj&nav=MzE0NzU1N2UtMjU3MC00ZmU5LTlkNTUtZjY2NzZmYzBhNmFk" target="_blank">Universalização</a></li>
        </ul>
      </li>
      <li><a href="https://copasa.sharepoint.com/sites/sppe/SitePages/contratos.aspx" target="_blank">Gestão de Contratos</a></li>
      <li><a href="https://copasa.sharepoint.com/sites/sppe/SitePages/materiais.aspx" target="_blank">Aquisição de Materiais / Equipamentos</a></li>
      <li><a href="https://copasa.sharepoint.com/sites/sppe/SitePages/remanejamento.aspx" target="_blank">Remanejamento de Recursos</a></li>
    </ul>
  </nav>

  <script>
    const toggle = document.querySelector(".menu-toggle");
    const menu = document.querySelector("nav ul");

    toggle.addEventListener("click", () => {
      menu.classList.toggle("showing");
    });
  </script>
</body>
</html>
